version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: edugest_db
    environment:
      POSTGRES_DB: edugest
      POSTGRES_USER: edugest
      POSTGRES_PASSWORD: edugest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
