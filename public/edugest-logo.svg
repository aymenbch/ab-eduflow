<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2461;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "Edu" — poids normal -->
  <text
    x="8" y="68"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="400"
    letter-spacing="-1"
    fill="#1B3A8C"
  >Edu</text>

  <!-- Livre ouvert intégré dans le "d" — positionné en superposition -->
  <!-- Livre ouvert miniature sur le jambage du d (autour de x=95, y=30) -->
  <g transform="translate(80, 14) scale(0.82)">
    <!-- Page gauche -->
    <path d="M4 8 C4 8 14 6 20 8 L20 30 C14 28 4 30 4 30 Z" fill="#4A90D9" opacity="0.9"/>
    <!-- Page droite -->
    <path d="M20 8 C26 6 36 8 36 8 L36 30 C36 30 26 28 20 30 Z" fill="#4A90D9" opacity="0.9"/>
    <!-- Reliure centrale -->
    <line x1="20" y1="8" x2="20" y2="30" stroke="#1B3A8C" stroke-width="1.5"/>
    <!-- Lignes de texte page gauche -->
    <line x1="8"  y1="14" x2="17" y2="13" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="8"  y1="18" x2="17" y2="17" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="8"  y1="22" x2="17" y2="21" stroke="white" stroke-width="1" opacity="0.7"/>
    <!-- Lignes de texte page droite -->
    <line x1="23" y1="13" x2="32" y2="14" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="23" y1="17" x2="32" y2="18" stroke="white" stroke-width="1" opacity="0.7"/>
    <line x1="23" y1="21" x2="32" y2="22" stroke="white" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- "Gest" — très gras, bleu marine foncé -->
  <text
    x="147" y="68"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="900"
    letter-spacing="-1"
    fill="#0F2461"
  >Gest</text>
</svg>
